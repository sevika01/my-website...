<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Elements selector */
        div {
            /* background-color:red */
        }

        /* class selector */
        .red {
            background-color: red;
        }

        /* id selector */
        #green {
            background-color: green;
        }

        /* child selector */
        div>p {
            color: rgb(119, 119, 253);
            background-color: brown;
        }

        /* descendant selector */
        div p {
            color: blue;
            background-color: brown;
        }

        /* universal selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* pseudo selector */
        a:visited {
            color: maroon;
        }

        a:link {
            color: green;
        }

        a:active {
            background-color: rgb(52, 188, 11);
        }

        a:hover {
            background-color: chartreuse
        }

        p:first-child {
            background-color: aqua;
        }
        
        
    </style>
</head>

<body>
    <div class="one">
        <p>I am first</p>
        <p>I am second</p>

    </div>
    <div class="red">
        i am a div
        <article>
            <p>i am a para inside div</p>
        </article>
    </div>
    <div id="green">
        i am another div
    </div>
    <a href="https://google.com"> Go to Google</a>
    <a href="https://www.facebook.com">Go to Facebook</a>

</body>

</html>
